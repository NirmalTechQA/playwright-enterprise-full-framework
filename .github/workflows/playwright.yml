name: Playwright Enterprise Tests

on:

  # Automatic execution
  push:

  pull_request:

  # Manual execution
  workflow_dispatch:

    inputs:

      execution_type:
        description: 'Select execution type'
        required: true
        default: 'all'

        type: choice

        options:
          - all
          - ui-chromium
          - ui-firefox
          - api

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # Checkout Repository
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v5

        with:
          node-version: 22
          cache: npm

      # Install Dependencies
      - name: Install Dependencies
        run: npm ci

      # Install Playwright Browsers
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -----------------------------------
      # RUN ALL TESTS
      # -----------------------------------

      - name: Run Complete Suite
        if: |
          github.event.inputs.execution_type == 'all' ||
          github.event.inputs.execution_type == ''

        continue-on-error: true

        run: |
          npx playwright test

      # -----------------------------------
      # UI TESTS - CHROMIUM
      # -----------------------------------

      - name: Run UI Tests - Chromium
        if: github.event.inputs.execution_type == 'ui-chromium'

        continue-on-error: true

        run: |
          npx playwright test tests/ui --project=chromium

      # -----------------------------------
      # UI TESTS - FIREFOX
      # -----------------------------------

      - name: Run UI Tests - Firefox
        if: github.event.inputs.execution_type == 'ui-firefox'

        continue-on-error: true

        run: |
          npx playwright test tests/ui --project=firefox

      # -----------------------------------
      # API TESTS
      # -----------------------------------

      - name: Run API Tests
        if: github.event.inputs.execution_type == 'api'

        continue-on-error: true

        run: |
          npx playwright test tests/api

      # -----------------------------------
      # UPLOAD PLAYWRIGHT REPORT
      # -----------------------------------

      - name: Upload Playwright Report
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      # -----------------------------------
      # UPLOAD TEST RESULTS
      # -----------------------------------

      - name: Upload Test Results
        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore