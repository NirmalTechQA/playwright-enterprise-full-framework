name: Playwright Enterprise Tests

on:

  # Auto Trigger
  push:

  pull_request:

  # Manual Trigger
  workflow_dispatch:

    inputs:

      execution_type:
        description: 'Select execution type'
        required: true
        default: 'all'

        type: choice

        options:
          - all
          - ui-chromium
          - ui-firefox
          - api

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  playwright-tests:

    runs-on: ubuntu-latest

    timeout-minutes: 60

    steps:

      # -----------------------------------
      # CHECKOUT
      # -----------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v5

      # -----------------------------------
      # SETUP NODE
      # -----------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v5

        with:
          node-version: 22
          cache: npm

      # -----------------------------------
      # INSTALL DEPENDENCIES
      # -----------------------------------

      - name: Install Dependencies
        run: npm ci

      # -----------------------------------
      # INSTALL PLAYWRIGHT BROWSERS
      # -----------------------------------

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # ===================================
      # COMPLETE SUITE
      # Runs:
      # - On push
      # - On pull_request
      # - Manual trigger with 'all'
      # ===================================

      - name: Run Complete Suite

        if: |
          github.event_name == 'push' ||
          github.event_name == 'pull_request' ||
          github.event.inputs.execution_type == 'all'

        continue-on-error: true

        run: |
          npx playwright test

      # ===================================
      # UI TESTS - CHROMIUM
      # Manual trigger only
      # ===================================

      - name: Run UI Tests - Chromium

        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.execution_type == 'ui-chromium'

        continue-on-error: true

        run: |
          npx playwright test tests/ui --project=chromium

      # ===================================
      # UI TESTS - FIREFOX
      # Manual trigger only
      # ===================================

      - name: Run UI Tests - Firefox

        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.execution_type == 'ui-firefox'

        continue-on-error: true

        run: |
          npx playwright test tests/ui --project=firefox

      # ===================================
      # API TESTS
      # Manual trigger only
      # ===================================

      - name: Run API Tests

        if: |
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.execution_type == 'api'

        continue-on-error: true

        run: |
          npx playwright test tests/api

      # ===================================
      # UPLOAD HTML REPORT
      # ===================================

      - name: Upload Playwright Report

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      # ===================================
      # UPLOAD TRACES / VIDEOS / SCREENSHOTS
      # ===================================

      - name: Upload Test Results

        if: always()

        uses: actions/upload-artifact@v4

        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore